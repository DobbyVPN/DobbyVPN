syntax = "proto3";

option go_package = "go_module/grpcproto";

package grpcproto;

service Vpn {
  // awg.go
  rpc StartAwg (StartAwgRequest)  returns (Empty);
  rpc StopAwg (Empty)             returns (Empty);

  // outline.go
  rpc GetOutlineLastError(Empty)          returns (GetOutlineLastErrorResponse);
  rpc StartOutline (StartOutlineRequest)  returns (StartOutlineResponse);
  rpc StopOutline (Empty)                 returns (Empty);

  // xray.go
  rpc GetXrayLastError(Empty)        returns (GetXrayLastErrorResponse);
  rpc StartXray (StartXrayRequest)   returns (StartXrayResponse);
  rpc StopXray (Empty)               returns (Empty);

  // trusttunnel.go
  rpc GetTrustTunnelLastError(Empty)                   returns (GetTrustTunnelLastErrorResponse);
  rpc StartTrustTunnel (StartTrustTunnelRequest)       returns (StartTrustTunnelResponse);
  rpc StopTrustTunnel (Empty)                          returns (Empty);

  // health_check.go
  rpc CouldStart (Empty)                        returns (CouldStartResponce);
  rpc GetConnectionState (Empty)                returns (GetConnectionStateResponce);
  rpc InitHealthCheck (Empty)                   returns (Empty);
  rpc StartHealthCheck (Empty)                  returns (Empty);
  rpc StopHealthCheck (Empty)                   returns (Empty);
  rpc CheckServerAlive (CheckServerAliveRequest) returns (CheckServerAliveResponce);

  // cloak.go
  rpc StartCloakClient (StartCloakClientRequest)    returns (Empty);
  rpc StopCloakClient (Empty)                       returns (Empty);

  // logger.go
  rpc InitLogger (InitLoggerRequest)                              returns (Empty);
  rpc InitTelemetry (InitTelemetryRequest)                        returns (Empty);
  rpc StopTelemetry (Empty)                                       returns (Empty);
  rpc SetupTelemetryAttributes (SetupTelemetryAttributesRequest)  returns (Empty);

  // georouting.go
  rpc SetGeoRoutingConf (SetGeoRoutingConfRequest)  returns (Empty);
  rpc ClearGeoRoutingConf (Empty)                   returns (Empty);
}

message StartAwgRequest {
  string config = 1;
}

message GetOutlineLastErrorResponse {
  string error = 1;
}

message StartOutlineRequest {
  string config = 1;
}

message StartOutlineResponse {
  int32 result = 1;
}

message GetXrayLastErrorResponse {
  string error = 1;
}

message StartXrayRequest {
  string config = 1;
}

message StartXrayResponse {
  int32 result = 1;
}

message CouldStartResponce {
  bool result = 1;
}

message GetConnectionStateResponce {
  int32 connectionState = 1;
}

message StartCloakClientRequest {
  string localHost = 1;
  string localPort = 2;
  string config = 3;
  bool udp = 4;
}

message InitLoggerRequest {
  string path = 1;
}

message InitTelemetryRequest {
  string endpoint = 1;
  string token = 2;
}

message SetGeoRoutingConfRequest {
  string cidrs = 1;
}

message NetCheckRequest {
  string configPath = 1;
}

message NetCheckResponse {
  string error = 1;
}

message SetupTelemetryAttributesRequest {
  string config = 1;
}

message GetTrustTunnelLastErrorResponse {
  string error = 1;
}

message StartTrustTunnelRequest {
  string config = 1;
}

message StartTrustTunnelResponse {
  int32 result = 1;
}


message CheckServerAliveRequest {
  string address = 1;
  int32 port = 2;
}

message CheckServerAliveResponce {
  int32 result = 1;
}

message Empty {
}
