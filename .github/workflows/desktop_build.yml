name: Desktop Build

on:
  workflow_call:

jobs:
  desktop_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows gRPC vpn service
        uses: actions/download-artifact@v4
        with:
          name: windows_grpcvpnserver.exe
          path: kmp_module/services

      - name: Download Linux gRPC vpn service
        uses: actions/download-artifact@v4
        with:
          name: ubuntu_grpcvpnserver
          path: kmp_module/services

      - name: Add permissions to ubuntu service executable
        working-directory: kmp_module/services
        run: |
          chmod +x ubuntu_grpcvpnserver

      - name: Download macOS gRPC vpn service
        uses: actions/download-artifact@v4
        with:
          name: macos_grpcvpnserver
          path: kmp_module/services

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            kmp_module/**/*.gradle.kts
            kmp_module/gradle/libs.versions.toml
            kmp_module/gradle/wrapper/gradle-wrapper.properties

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-35
            platforms;android-36
            build-tools;36.0.0

      - name: Build desktop via script
        run: |
          python .github/scripts/desktop_build.py app --skip-libs --require-all-services
        env:
          APP_MAJOR_VERSION: ${{ vars.MAJOR }}
          APP_MINOR_VERSION: ${{ vars.MINOR }}
          APP_MAINTENANCE_VERSION: ${{ vars.MAINTENANCE }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Conveyor build site
        uses: hydraulic-software/conveyor/actions/build@v16.0
        env:
          OAUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: make site
          extra_flags: "--passphrase=\"${{ secrets.CONVEYOR_PASSPHRASE }}\" -f kmp_module/conveyor.conf"
          signing_key: ${{ secrets.CONVEYOR_SIGNING_KEY }}
          agree_to_license: 1

      - name: Find files
        id: find_deb
        run: |
          {
            echo "DEB_FILE=$(find ./output -name '*.deb' -type f)"
            echo "MAC_AARCH64_FILE=$(find ./output -name '*-mac-aarch64.zip' -type f)"
            echo "MAC_AMD64_FILE=$(find ./output -name '*-mac-amd64.zip' -type f)"
            echo "WIN_ZIP_FILE=$(find ./output -name '*-windows-amd64.zip' -type f)"
          } >> $GITHUB_ENV

      - name: Rename files
        run: |
          mkdir upload
          cp "${{ env.DEB_FILE }}" upload/dobbyVPN-linux.deb
          cp "${{ env.MAC_AARCH64_FILE }}" upload/dobbyVPN-macos-aarch64.zip
          cp "${{ env.MAC_AMD64_FILE }}" upload/dobbyVPN-macos-amd64.zip
          cp "${{ env.WIN_ZIP_FILE }}" upload/dobbyVPN-windows.zip

      - name: Upload Debian
        uses: actions/upload-artifact@v4
        with:
          name: dobbyVPN-linux.deb
          path: upload/dobbyVPN-linux.deb

      - name: Upload zip for macOS aarch64
        uses: actions/upload-artifact@v4
        with:
          name: dobbyVPN-macos-aarch64.zip
          path: upload/dobbyVPN-macos-aarch64.zip

      - name: Upload zip for macOS amd64
        uses: actions/upload-artifact@v4
        with:
          name: dobbyVPN-macos-amd64.zip
          path: upload/dobbyVPN-macos-amd64.zip

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: dobbyVPN-windows.zip
          path: upload/dobbyVPN-windows.zip

      - name: Cleanup Conveyor
        if: always()
        run: |
          rm -rf .conveyor/cache/*

      - name: Display file tree with sizes after Windows build
        run: |
          echo "Displaying the size of files and directories in 'output' directory:"
          du -ah output | sort -rh
