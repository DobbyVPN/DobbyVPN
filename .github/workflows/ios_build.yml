name: iOS Build

on:
  workflow_call:

# on:
#   pull_request:    
#     branches:   
#       - main

jobs:
  ios_build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"

      - name: Set up JDK 21.0.6 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: "21.0.6"
          distribution: "temurin"

      - name: Select Xcode 16.1
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Set up Git Submodules
        run: git submodule update --init --recursive

      - name: Install Go dependencies
        run: go get ./...

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Sentry auth
        run: |
          cd kmp_client/iosApp
          echo "[auth]" > .sentryclirc
          echo "token=${{ secrets.SENTRY_AUTH }}" >> .sentryclirc

      - name: Remove old MyLibrary.xcframework
        run: rm -rf kmp_client/iosApp/MyLibrary.xcframework

      - name: Download IOS lib
        uses: actions/download-artifact@master
        with:
          name: MyLibrary.xcframework
          path: kmp_client/iosApp/MyLibrary.xcframework

      - name: Install Apple Certificates
        uses: apple-actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.CERT_P12_BASE64 }}
          p12-password: ${{ secrets.CERT_P12_PASSWORD }}

      - name: Install Provisioning Profiles
        uses: nickwph/apple-provisioning-profile-action@v1
        with:
          mobileprovision-base64: |
            ${{ secrets.PROVISION_DOBBY_BASE64 }}
            ${{ secrets.PROVISION_DOBBY_TUNNEL_BASE64 }}

      - name: Build & Upload to TestFlight via Fastlane
        working-directory: kmp_client
        run: |
          bundle install
          bundle exec fastlane ios build_ios
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_API_KEY: ${{ secrets.APP_STORE_API_KEY }}
          GITHUB_REF: ${{ github.ref }}

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        if: ${{ github.ref == 'refs/heads/main' }} 
        with:
          name: DobbyVPN-ipa
          path: kmp_client/iosApp/*.ipa

      - name: Write go depends
        run: |
          go mod tidy
          cat go.mod
