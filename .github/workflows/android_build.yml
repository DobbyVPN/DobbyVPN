name: Android Build

on:
  workflow_call:

jobs:
  android_build:
    runs-on: ubuntu-latest
    env:
      APP_MAJOR_VERSION: ${{ vars.MAJOR }}
      APP_MINOR_VERSION: ${{ vars.MINOR }}
      APP_MAINTENANCE_VERSION: ${{ vars.MAINTENANCE }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      FDROID_COMPAT_SOURCE_ROOT: /home/vagrant/build/com.dobby.vpn

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up bootstrap Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'

      - name: Read Android Go version
        id: android_go
        run: echo "version=$(cat .go-version)" >> "$GITHUB_OUTPUT"

      - name: Cache Android Go toolchain
        uses: actions/cache@v4
        with:
          path: .ci-cache/go-android
          key: ${{ runner.os }}-android-go-${{ steps.android_go.outputs.version }}

      - name: Build Go from source for Android
        run: |
          GO_VERSION="${{ steps.android_go.outputs.version }}"
          GO_SRC="$GITHUB_WORKSPACE/.ci-cache/go-android"

          if [ ! -x "$GO_SRC/bin/go" ]; then
            rm -rf "$GO_SRC"
            git clone --depth 1 --branch "go${GO_VERSION}" https://github.com/golang/go.git "$GO_SRC"
            pushd "$GO_SRC/src"
            ./make.bash
            popd
          fi

          echo "GOROOT=$GO_SRC" >> "$GITHUB_ENV"
          echo "$GO_SRC/bin" >> "$GITHUB_PATH"
          "$GO_SRC/bin/go" env GOROOT GOVERSION

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: |
            kmp_module/**/*.gradle.kts
            kmp_module/gradle/libs.versions.toml
            kmp_module/gradle/wrapper/gradle-wrapper.properties

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-35
            platforms;android-36
            build-tools;36.0.0
            ndk;27.2.12479018

      - name: Cache gomobile
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/gomobile
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-gomobile-${{ steps.android_go.outputs.version }}-${{ hashFiles('go_module/go.sum') }}

      - name: Install gomobile
        run: |
          cd go_module
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260520154334-0e4426e1883d
          cd ..
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          go env GOROOT GOVERSION GOFLAGS
          "$HOME/go/bin/gomobile" init

      - name: Prepare F-Droid-compatible source path
        run: |
          sudo mkdir -p "$(dirname "$FDROID_COMPAT_SOURCE_ROOT")"
          sudo chown -R "$USER:$USER" /home/vagrant
          rsync -a --delete --exclude='.git' "$GITHUB_WORKSPACE/" "$FDROID_COMPAT_SOURCE_ROOT/"

      - name: Build unsigned via Fastlane
        working-directory: /home/vagrant/build/com.dobby.vpn
        run: |
          bundle exec fastlane android build_android

      - name: Build & sign via Fastlane
        working-directory: /home/vagrant/build/com.dobby.vpn
        run: |
          bundle exec fastlane android build_android_and_signing
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: dobbyvpn-android-sign.apk
          path: ${{ env.FDROID_COMPAT_SOURCE_ROOT }}/fastlane/DobbyVPN-v${{ vars.MAJOR }}.${{ vars.MINOR }}.${{ vars.MAINTENANCE }}-sign.apk

      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: dobbyvpn-android-unsign.apk
          path: ${{ env.FDROID_COMPAT_SOURCE_ROOT }}/fastlane/DobbyVPN-v${{ vars.MAJOR }}.${{ vars.MINOR }}.${{ vars.MAINTENANCE }}-unsign.apk
