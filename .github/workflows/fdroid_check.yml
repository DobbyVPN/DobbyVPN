name: F-Droid Compliance

on:
  workflow_call:

jobs:
  check-binaries:
    name: Check for committed binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Find executable binaries in repo
        run: |
          BINS=$(git ls-files | xargs file --mime-type 2>/dev/null \
            | grep -E 'application/java-archive|application/x-executable|application/x-sharedlib|application/x-mach-binary|application/x-pie-executable' \
            | grep -v 'gradle-wrapper.jar' \
            | cut -d: -f1)
          if [ -n "$BINS" ]; then
            echo "::error::Binary files found in repository:"
            echo "$BINS"
            exit 1
          fi
          echo "No binaries found"

  scan-apk:
    name: Scan APK for proprietary packages
    runs-on: ubuntu-latest
    env:
      FDROID_COMPAT_SOURCE_ROOT: /home/vagrant/build/com.dobby.vpn
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up bootstrap Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version

      - name: Read Android Go version
        id: android_go
        run: echo "version=$(cat .go-version)" >> "$GITHUB_OUTPUT"

      - name: Cache Android Go toolchain
        uses: actions/cache@v4
        with:
          path: .ci-cache/go-android
          key: ${{ runner.os }}-android-go-${{ steps.android_go.outputs.version }}

      - name: Build Go from source for Android
        run: |
          GO_VERSION="${{ steps.android_go.outputs.version }}"
          GO_SRC="$GITHUB_WORKSPACE/.ci-cache/go-android"

          if [ ! -x "$GO_SRC/bin/go" ]; then
            rm -rf "$GO_SRC"
            git clone --depth 1 --branch "go${GO_VERSION}" https://github.com/golang/go.git "$GO_SRC"
            pushd "$GO_SRC/src"
            ./make.bash
            popd
          fi

          echo "GOROOT=$GO_SRC" >> "$GITHUB_ENV"
          echo "$GO_SRC/bin" >> "$GITHUB_PATH"
          "$GO_SRC/bin/go" env GOROOT GOVERSION

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: |
            kmp_module/**/*.gradle.kts
            kmp_module/gradle/libs.versions.toml
            kmp_module/gradle/wrapper/gradle-wrapper.properties

      - uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-35
            platforms;android-36
            build-tools;36.0.0
            ndk;27.2.12479018

      - name: Configure Android native toolchain
        run: |
          ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Cache gomobile
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/gomobile
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-gomobile-${{ steps.android_go.outputs.version }}-${{ hashFiles('go_module/go.sum') }}

      - name: Install gomobile
        run: |
          cd go_module
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260520154334-0e4426e1883d
          cd ..
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          go env GOROOT GOVERSION GOFLAGS
          "$HOME/go/bin/gomobile" init

      - name: Prepare F-Droid-compatible source path
        run: |
          sudo mkdir -p "$(dirname "$FDROID_COMPAT_SOURCE_ROOT")"
          sudo chown -R "$USER:$USER" /home/vagrant
          rsync -a --delete --exclude='.git' "$GITHUB_WORKSPACE/" "$FDROID_COMPAT_SOURCE_ROOT/"

      - name: Remove non-Android modules
        run: |
          rm -rf "$FDROID_COMPAT_SOURCE_ROOT/swift_module"

      - name: Build gomobile Android backend
        working-directory: /home/vagrant/build/com.dobby.vpn/kmp_module
        run: |
          ./gradlew :app:gomobileBindAndroid --build-cache --parallel

      - name: Build APK
        working-directory: /home/vagrant/build/com.dobby.vpn/kmp_module
        run: |
          ./gradlew app:assembleRelease --build-cache --parallel \
            -Pandroid.injected.version.code=1 \
            -Pandroid.injected.version.name=0.0.1

      - name: Scan for proprietary packages
        run: |
          BLOCKED=(
            # Google proprietary
            "com.google.firebase"
            "com.google.android.gms"
            "com.google.gms"
            "com.google.android.play"
            "com.google.android.libraries"
            "com.google.mlkit"
            "com.google.android.recaptcha"
            "com.google.android.ump"
            "com.google.ads"
            # Analytics / tracking
            "com.crashlytics"
            "io.fabric"
            "com.amplitude"
            "com.mixpanel"
            "com.appsflyer"
            "com.adjust.sdk"
            "com.flurry"
            # Ads
            "com.facebook.android"
            "com.unity3d.ads"
            "com.applovin"
            "com.chartboost"
            "com.vungle"
            "com.ironsource"
            "com.adcolony"
            "com.startapp"
          )

          APK=kmp_module/app/build/outputs/apk/release/app-release-unsigned.apk
          PACKAGES=$(apkanalyzer dex packages "$APK" 2>/dev/null | awk '{print $NF}')

          FOUND=0
          for p in "${BLOCKED[@]}"; do
            if echo "$PACKAGES" | grep -q "^${p}"; then
              echo "::error::Proprietary package in APK: $p"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No proprietary packages found in APK"
