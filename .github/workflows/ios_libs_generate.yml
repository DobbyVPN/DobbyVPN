name: Build iOS VPN Libraries

on:
  workflow_call:

jobs:
  build_ios_lib:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache iOS VPN library
        id: ios_lib_cache
        uses: actions/cache@v4
        with:
          path: go_module/MyLibrary.xcframework
          key: ${{ runner.os }}-ios-vpn-lib-${{ hashFiles('.go-version', 'go_module/go.sum', 'go_module/**', 'Cloak/internal/**') }}

      - name: Set up Go
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache-dependency-path: go_module/go.sum

      - name: Vendor Cloak/internal
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        run: |
          cp -r Cloak/internal go_module/modules/Cloak/

      - name: Download Go modules & dependencies
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          go mod download
          go mod tidy

      - name: Install gomobile & init
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        run: |
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260520154334-0e4426e1883d
          gomobile init

      - name: Fetch gomobile runtime
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          go get "golang.org/x/mobile/bind@$(go list -m -f '{{.Version}}' golang.org/x/mobile)"

      - name: Build iOS XCFramework
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          GO111MODULE=on gomobile bind -trimpath -ldflags="-buildid=" -target=ios -o MyLibrary.xcframework ./ios_exports
          
          # Merge libdobby_bridge.a into the generated static framework for iOS arm64
          MODULE_DIR=$(go list -m -f '{{.Dir}}' trusttunnel-go)
          DOBBY_LIB="$MODULE_DIR/lib/ios/libdobby_bridge.a"
          
          EXPECTED_HASH="cbf8a0937ca8a745be4629246f4f9b9aac06cffac85e67cd3dcab7b7d1fdf6e1"
          ACTUAL_HASH=$(shasum -a 256 "$DOBBY_LIB" | awk '{print $1}')
          if [ "$ACTUAL_HASH" != "$EXPECTED_HASH" ]; then
            echo "Error: SHA256 hash verification failed for $DOBBY_LIB"
            echo "Expected: $EXPECTED_HASH"
            echo "Actual:   $ACTUAL_HASH"
            exit 1
          fi

          MY_LIB="MyLibrary.xcframework/ios-arm64/MyLibrary.framework/MyLibrary"
          
          if [ -f "$DOBBY_LIB" ] && [ -f "$MY_LIB" ]; then
            echo "Merging $DOBBY_LIB into $MY_LIB"
            libtool -static -D -o MyLibrary_merged.a "$MY_LIB" "$DOBBY_LIB"
            mv MyLibrary_merged.a "$MY_LIB"
          else
            echo "Error: Could not find libraries to merge."
            exit 1
          fi

      - name: Upload iOS XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: MyLibrary.xcframework
          path: go_module/MyLibrary.xcframework

  build_ios_app_lib:
    runs-on: macos-15
    env:
      APP_MAJOR_VERSION: ${{ vars.MAJOR }}
      APP_MINOR_VERSION: ${{ vars.MINOR }}
      APP_MAINTENANCE_VERSION: ${{ vars.MAINTENANCE }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: |
            kmp_module/**/*.gradle.kts
            kmp_module/gradle/libs.versions.toml
            kmp_module/gradle/wrapper/gradle-wrapper.properties

      - name: Cache Kotlin/Native compiler data
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('kmp_module/gradle/libs.versions.toml', 'kmp_module/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Cache Gradle build outputs
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/build-cache-*
          key: ${{ runner.os }}-gradle-build-cache-${{ hashFiles('kmp_module/**/*.gradle.kts', 'kmp_module/gradle/libs.versions.toml', 'kmp_module/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-build-cache-

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-xcode-spm-${{ hashFiles('swift_module/iosApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-spm-

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project swift_module/iosApp.xcodeproj

      - name: Build KMP iOS framework
        working-directory: kmp_module
        run: |
          VERSION_NAME="${APP_MAJOR_VERSION}.${APP_MINOR_VERSION}.${APP_MAINTENANCE_VERSION}"
          VERSION_CODE=$((APP_MAJOR_VERSION * 1000000 + APP_MINOR_VERSION * 1000 + APP_MAINTENANCE_VERSION))
          ./gradlew linkReleaseFrameworkIosArm64 --build-cache --parallel \
            -PprojectRepositoryCommit="${GITHUB_SHA}" \
            -PprojectRepositoryCommitLink="https://github.com/${GITHUB_REPOSITORY}/tree/${GITHUB_SHA}" \
            -Pandroid.injected.version.code="${VERSION_CODE}" \
            -Pandroid.injected.version.name="${VERSION_NAME}"

      - name: Upload app.framework
        uses: actions/upload-artifact@v4
        with:
          name: app.framework
          path: kmp_module/app/build/bin/iosArm64/releaseFramework/app.framework
