name: Android Instrumented Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      suite:
        description: "Which suite to run: baseline / heavy / both"
        type: choice
        required: false
        default: both
        options:
          - baseline
          - heavy
          - both
      api-level:
        description: "Android API level for emulator"
        type: string
        required: false
        default: "34"
      run_full_build:
        description: "Run full assemble before instrumented tests"
        type: boolean
        required: false
        default: true

jobs:
  android-instrumented:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Go 1.24.3
        if: ${{ github.event_name == 'pull_request' || inputs.run_full_build }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.3"

      - name: Set up Android SDK (NDK for liboutline build)
        if: ${{ github.event_name == 'pull_request' || inputs.run_full_build }}
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            ndk;27.0.11718014

      - name: Prepare outline native headers/libs for Android assemble
        if: ${{ github.event_name == 'pull_request' || inputs.run_full_build }}
        run: |
          cp -r Cloak/internal go_client/modules/Cloak/
          cd go_client
          go mod tidy
          go mod download
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11718014
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          export DEBUG_PREFIX_FLAGS="-fdebug-prefix-map=$ANDROID_SDK_ROOT=/android-sdk -fdebug-prefix-map=$ANDROID_NDK_HOME=/android-ndk"
          export CGO_CFLAGS="$DEBUG_PREFIX_FLAGS ${CGO_CFLAGS:-}"
          export CGO_LDFLAGS="$DEBUG_PREFIX_FLAGS ${CGO_LDFLAGS:-}"
          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 go build -v -trimpath -ldflags="-buildid=" -buildvcs=false -buildmode=c-shared -o liboutline.so ./kotlin_exports/...
          mkdir -p ../kmp_client/outline/src/main/cpp/include/arm64-v8a
          mkdir -p ../kmp_client/outline/src/main/jniLibs/arm64-v8a
          cp liboutline.h ../kmp_client/outline/src/main/cpp/include/arm64-v8a/liboutline.h
          cp liboutline.so ../kmp_client/outline/src/main/jniLibs/arm64-v8a/liboutline.so

      - name: Optional full build
        if: ${{ github.event_name == 'pull_request' || inputs.run_full_build }}
        working-directory: kmp_client
        run: ./gradlew :app:assemble

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumented baseline suite
        if: ${{ github.event_name == 'pull_request' || inputs.suite == 'baseline' || inputs.suite == 'both' }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level || '34' }}
          arch: x86_64
          profile: pixel_6
          force-avd-creation: true
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-boot-anim -camera-back none -camera-front none
          script: |
            cd kmp_client
            ./gradlew :app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.dobby.feature.e2e.AndroidThinClientBaselineInstrumentedTest

      - name: Run Android instrumented heavy suite
        if: ${{ inputs.suite == 'heavy' || inputs.suite == 'both' }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level || '34' }}
          arch: x86_64
          profile: pixel_6
          force-avd-creation: true
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-boot-anim -camera-back none -camera-front none
          script: |
            cd kmp_client
            ./gradlew :app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.dobby.feature.e2e.AndroidThinClientHeavyInstrumentedTest
