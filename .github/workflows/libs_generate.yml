name: Build VPN Libraries

on:
  workflow_call: {}
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag for new library release'
        required: false
        default: ''
        type: string

jobs:
  build_desktop_libs:
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        os: [windows, ubuntu, macos]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache desktop VPN library
        id: desktop_lib_cache
        uses: actions/cache@v4
        with:
          path: |
            go_module/windows_grpcvpnserver.exe
            go_module/ubuntu_grpcvpnserver
            go_module/macos_grpcvpnserver
          key: ${{ runner.os }}-desktop-vpn-lib-${{ hashFiles('.go-version', 'go_module/**', 'Cloak/internal/**') }}

      - name: Set up Go
        if: steps.desktop_lib_cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache-dependency-path: go_module/go.sum

      - name: Vendor Cloak/internal
        if: steps.desktop_lib_cache.outputs.cache-hit != 'true'
        run: |
          cp -r Cloak/internal go_module/modules/Cloak/

      - name: Download Go modules
        if: steps.desktop_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          go mod tidy
          go mod download

      - name: Install compiler
        if: matrix.os != 'windows' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        id: install_cc
        uses: rlalik/setup-cpp-compiler@master
        with:
          compiler: latest

      - name: Build Windows library
        if: matrix.os == 'windows'
        working-directory: go_module
        run: |
          go build -trimpath -ldflags="-buildid=" -o windows_grpcvpnserver.exe ./desktop_exports/
        env:
          CGO_ENABLED: '1'
          GOOS: 'windows'
          GOARCH: 'amd64'
          CC: ${{ steps.install_cc.outputs.cc }}
          CXX: ${{ steps.install_cc.outputs.cxx }}

      - name: Build Linux library
        if: matrix.os == 'ubuntu'
        working-directory: go_module
        run: |
          go build -trimpath -ldflags="-buildid=" -o ubuntu_grpcvpnserver ./desktop_exports/
        env:
          CGO_ENABLED: '1'
          GOOS: 'linux'
          GOARCH: 'amd64'
          CC: ${{ steps.install_cc.outputs.cc }}
          CXX: ${{ steps.install_cc.outputs.cxx }}

      - name: Build macOS library
        if: matrix.os == 'macos'
        working-directory: go_module
        run: |
          go build -trimpath -ldflags="-buildid=" -o macos_grpcvpnserver ./desktop_exports/
        env:
          CGO_ENABLED: '1'
          GOOS: 'darwin'
          GOARCH: 'arm64'
          CC: ${{ steps.install_cc.outputs.cc }}
          CXX: ${{ steps.install_cc.outputs.cxx }}

      - name: Upload built libraries
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows_grpcvpnserver.exe
          path: |
            go_module/windows_grpcvpnserver.exe

      - name: Upload built libraries
        if: matrix.os == 'ubuntu'
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu_grpcvpnserver
          path: |
            go_module/ubuntu_grpcvpnserver

      - name: Upload built libraries
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos_grpcvpnserver
          path: |
            go_module/macos_grpcvpnserver

  build_ios_lib:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache iOS VPN library
        id: ios_lib_cache
        uses: actions/cache@v4
        with:
          path: go_module/MyLibrary.xcframework
          key: ${{ runner.os }}-ios-vpn-lib-${{ hashFiles('.go-version', 'go_module/**', 'Cloak/internal/**') }}

      - name: Set up Go
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache-dependency-path: go_module/go.sum

      - name: Vendor Cloak/internal
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        run: |
          cp -r Cloak/internal go_module/modules/Cloak/

      - name: Download Go modules & dependencies
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          go mod download
          go mod tidy

      - name: Install gomobile & init
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        run: |
          go install golang.org/x/mobile/cmd/gomobile@$(cd go_module && go list -m -f '{{.Version}}' golang.org/x/mobile)
          gomobile init

      - name: Fetch gomobile runtime
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          go get golang.org/x/mobile/bind@$(go list -m -f '{{.Version}}' golang.org/x/mobile)

      - name: Build iOS XCFramework
        if: steps.ios_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          GO111MODULE=on gomobile bind -target=ios -o MyLibrary.xcframework ./ios_exports

      - name: Upload iOS XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: MyLibrary.xcframework
          path: go_module/MyLibrary.xcframework


  build_ios_app_lib:
    runs-on: macos-15
    env:
      APP_MAJOR_VERSION: ${{ vars.MAJOR }}
      APP_MINOR_VERSION: ${{ vars.MINOR }}
      APP_MAINTENANCE_VERSION: ${{ vars.MAINTENANCE }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: |
            kmp_module/**/*.gradle.kts
            kmp_module/gradle/libs.versions.toml
            kmp_module/gradle/wrapper/gradle-wrapper.properties

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-xcode-spm-${{ hashFiles('swift_module/iosApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-spm-

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project swift_module/iosApp.xcodeproj

      - name: Build KMP iOS framework
        working-directory: kmp_module
        run: |
          VERSION_NAME="${APP_MAJOR_VERSION}.${APP_MINOR_VERSION}.${APP_MAINTENANCE_VERSION}"
          VERSION_CODE=$((APP_MAJOR_VERSION * 1000000 + APP_MINOR_VERSION * 1000 + APP_MAINTENANCE_VERSION))
          ./gradlew linkReleaseFrameworkIosArm64 --build-cache --parallel \
            -PprojectRepositoryCommit="${GITHUB_SHA}" \
            -PprojectRepositoryCommitLink="https://github.com/${GITHUB_REPOSITORY}/tree/${GITHUB_SHA}" \
            -Pandroid.injected.version.code="${VERSION_CODE}" \
            -Pandroid.injected.version.name="${VERSION_NAME}"

      - name: Upload app.framework
        uses: actions/upload-artifact@v4
        with:
          name: app.framework
          path: kmp_module/app/build/bin/iosArm64/releaseFramework/app.framework
