name: Build VPN Libraries

on:
  workflow_call: {}
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag for new library release'
        required: false
        default: ''
        type: string

jobs:
  build_desktop_libs:
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        os: [windows, ubuntu, macos]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Vendor Cloak/internal
        run: |
          cp -r Cloak/internal go_module/modules/Cloak/

      - name: Download Go modules
        working-directory: go_module
        run: |
          go mod tidy
          go mod download

      - name: Install compiler
        if: matrix.os != 'windows'
        id: install_cc
        uses: rlalik/setup-cpp-compiler@master
        with:
          compiler: latest

      - name: Build Windows library
        if: matrix.os == 'windows'
        working-directory: go_module
        run: |
          go build -trimpath -ldflags="-buildid=" -o windows_grpcvpnserver.exe ./desktop_exports/
        env:
          CGO_ENABLED: '1'
          GOOS: 'windows'
          GOARCH: 'amd64'
          CC: ${{ steps.install_cc.outputs.cc }}
          CXX: ${{ steps.install_cc.outputs.cxx }}

      - name: Build Linux library
        if: matrix.os == 'ubuntu'
        working-directory: go_module
        run: |
          go build -trimpath -ldflags="-buildid=" -o ubuntu_grpcvpnserver ./desktop_exports/
        env:
          CGO_ENABLED: '1'
          GOOS: 'linux'
          GOARCH: 'amd64'
          CC: ${{ steps.install_cc.outputs.cc }}
          CXX: ${{ steps.install_cc.outputs.cxx }}

      - name: Build macOS library
        if: matrix.os == 'macos'
        working-directory: go_module
        run: |
          go build -trimpath -ldflags="-buildid=" -o macos_grpcvpnserver ./desktop_exports/
        env:
          CGO_ENABLED: '1'
          GOOS: 'darwin'
          GOARCH: 'arm64'
          CC: ${{ steps.install_cc.outputs.cc }}
          CXX: ${{ steps.install_cc.outputs.cxx }}

      - name: Upload built libraries
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows_grpcvpnserver.exe
          path: |
            go_module/windows_grpcvpnserver.exe

      - name: Upload built libraries
        if: matrix.os == 'ubuntu'
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu_grpcvpnserver
          path: |
            go_module/ubuntu_grpcvpnserver

      - name: Upload built libraries
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos_grpcvpnserver
          path: |
            go_module/macos_grpcvpnserver

  build_android_lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.3'

      - name: Vendor Cloak/internal
        run: |
          cp -r Cloak/internal go_module/modules/Cloak/

      - name: Download Go modules
        working-directory: go_module
        run: |
          go mod tidy
          go mod download

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-36
            build-tools;36.0.0
            platform-tools
            ndk;27.0.11718014

      - name: Set up Android NDK and build arm64 .so
        working-directory: go_module
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11718014
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          export DEBUG_PREFIX_FLAGS="-fdebug-prefix-map=$ANDROID_SDK_ROOT=/android-sdk -fdebug-prefix-map=$ANDROID_NDK_HOME=/android-ndk"
          export CGO_CFLAGS="$DEBUG_PREFIX_FLAGS ${CGO_CFLAGS:-}"
          export CGO_LDFLAGS="$DEBUG_PREFIX_FLAGS ${CGO_LDFLAGS:-}"
          export CGO_LDFLAGS="$DEBUG_PREFIX_FLAGS -Wl,-z,max-page-size=16384 ${CGO_LDFLAGS:-}"
          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++
          go build -tags linux -ldflags="-buildid=" -v -trimpath -buildvcs=false -o libbackend.so -buildmode c-shared ./kotlin_exports/
        env:
          CGO_ENABLED: '1'
          GOOS: 'android'
          GOARCH: 'arm64'

      - name: Copy libs arm64 .so
        run: |
          mkdir -p kmp_module/backend/src/main/jniLibs/arm64-v8a
          cp go_module/libbackend.so kmp_module/backend/src/main/jniLibs/arm64-v8a/libbackend.so

      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: libbackend.so
          path: kmp_module/backend/src/main/jniLibs/arm64-v8a/libbackend.so

  build_ios_lib:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          check-latest: true

      - name: Vendor Cloak/internal
        run: |
          cp -r Cloak/internal go_module/modules/Cloak/

      - name: Download Go modules & dependencies
        working-directory: go_module
        run: |
          go mod download
          go mod tidy

      - name: Install gomobile & init
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Fetch gomobile runtime
        working-directory: go_module
        run: |
          go get golang.org/x/mobile/bind@latest

      - name: Build iOS XCFramework
        working-directory: go_module
        run: |
          GO111MODULE=on gomobile bind -target=ios -o MyLibrary.xcframework ./ios_exports

      - name: Upload iOS XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: MyLibrary.xcframework
          path: go_module/MyLibrary.xcframework


  build_ios_app_lib:
    runs-on: macos-15
    env:
      APP_MAJOR_VERSION: ${{ vars.MAJOR }}
      APP_MINOR_VERSION: ${{ vars.MINOR }}
      APP_MAINTENANCE_VERSION: ${{ vars.MAINTENANCE }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project swift_module/iosApp.xcodeproj

      - name: Build KMP iOS framework
        working-directory: kmp_module
        run: |
          VERSION_NAME="${APP_MAJOR_VERSION}.${APP_MINOR_VERSION}.${APP_MAINTENANCE_VERSION}"
          VERSION_CODE=$((APP_MAJOR_VERSION * 1000000 + APP_MINOR_VERSION * 1000 + APP_MAINTENANCE_VERSION))
          ./gradlew linkReleaseFrameworkIosArm64 \
            -PprojectRepositoryCommit="${GITHUB_SHA}" \
            -PprojectRepositoryCommitLink="https://github.com/${GITHUB_REPOSITORY}/tree/${GITHUB_SHA}" \
            -Pandroid.injected.version.code="${VERSION_CODE}" \
            -Pandroid.injected.version.name="${VERSION_NAME}"

      - name: Upload app.framework
        uses: actions/upload-artifact@v4
        with:
          name: app.framework
          path: kmp_module/app/build/bin/iosArm64/releaseFramework/app.framework
