name: Build Desktop VPN Libraries

on:
  workflow_call:

jobs:
  build_desktop_libs:
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        include:
          - os: windows
            platform: windows
            arch: amd64
          - os: ubuntu
            platform: linux
            arch: amd64
          - os: macos
            platform: macos
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache desktop VPN library
        id: desktop_lib_cache
        uses: actions/cache@v4
        with:
          path: |
            go_module/windows_grpcvpnserver.exe
            go_module/ubuntu_grpcvpnserver
            go_module/macos_grpcvpnserver
          key: ${{ runner.os }}-desktop-vpn-lib-${{ hashFiles('.go-version', 'go_module/**', 'Cloak/internal/**') }}

      - name: Set up Go
        if: steps.desktop_lib_cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache-dependency-path: go_module/go.sum

      - name: Build desktop VPN library
        if: steps.desktop_lib_cache.outputs.cache-hit != 'true'
        run: |
          python .github/scripts/desktop_build.py libs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --go-mod-tidy

      - name: Upload built libraries
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows_grpcvpnserver.exe
          path: |
            go_module/windows_grpcvpnserver.exe

      - name: Upload built libraries
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu_grpcvpnserver
          path: |
            go_module/ubuntu_grpcvpnserver

      - name: Upload built libraries
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos_grpcvpnserver
          path: |
            go_module/macos_grpcvpnserver
