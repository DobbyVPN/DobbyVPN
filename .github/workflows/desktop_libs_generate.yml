name: Build Desktop VPN Libraries

on:
  workflow_call:

jobs:
  build_desktop_libs:
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        os: [windows, ubuntu, macos]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache desktop VPN library
        id: desktop_lib_cache
        uses: actions/cache@v4
        with:
          path: |
            go_module/windows_grpcvpnserver.exe
            go_module/ubuntu_grpcvpnserver
            go_module/macos_grpcvpnserver
            go_module/libdobby_bridge.dll
            go_module/libdobby_bridge.so
          key: ${{ runner.os }}-desktop-vpn-lib-${{ hashFiles('.go-version', 'go_module/**', 'Cloak/internal/**') }}

      - name: Set up Go
        if: steps.desktop_lib_cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache-dependency-path: go_module/go.sum

      - name: Vendor Cloak/internal
        if: steps.desktop_lib_cache.outputs.cache-hit != 'true'
        run: |
          cp -r Cloak/internal go_module/modules/Cloak/

      - name: Download Go modules
        if: steps.desktop_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          go mod tidy
          go mod download

      - name: Install compiler
        if: matrix.os != 'windows' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        id: install_cc
        uses: rlalik/setup-cpp-compiler@master
        with:
          compiler: latest

      - name: Download TrustTunnel Windows lib
        if: matrix.os == 'windows' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        shell: bash
        run: |
          curl -L -o dobby_bridge-windows-x86_64.zip "https://github.com/DobbyVPN/go-go-tunnel/releases/download/v1.0.0/dobby_bridge-windows-x86_64.zip"
          echo "9c0d79401c3da26d922e58c5fc3317c75d800598e9cb91a31ce3aebbf71b4668 dobby_bridge-windows-x86_64.zip" | sha256sum -c -
          unzip dobby_bridge-windows-x86_64.zip

      - name: Build Windows library
        if: matrix.os == 'windows' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          go build -trimpath -ldflags="-buildid=" -o windows_grpcvpnserver.exe ./desktop_exports/
        env:
          CGO_ENABLED: '1'
          GOOS: 'windows'
          GOARCH: 'amd64'
          CGO_LDFLAGS: "-L${{ github.workspace }}/go_module"
          CC: ${{ steps.install_cc.outputs.cc }}
          CXX: ${{ steps.install_cc.outputs.cxx }}

      - name: Install libc++ for Linux
        if: matrix.os == 'ubuntu' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        run: |
          curl -O https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 || true
          rm ./llvm.sh
          sudo apt-get install -y libc++-21-dev libc++abi-21-dev

      - name: Download TrustTunnel Linux lib
        if: matrix.os == 'ubuntu' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          curl -L -o libdobby_bridge-linux-x86_64.zip "https://github.com/DobbyVPN/go-go-tunnel/releases/download/v1.0.0/libdobby_bridge-linux-x86_64.zip"
          echo "515c6993672e35d768477b3cd5c04ee7dfcbeaaeecd5abef5e03c1603486cbfe libdobby_bridge-linux-x86_64.zip" | sha256sum -c -
          unzip libdobby_bridge-linux-x86_64.zip

      - name: Build Linux library
        if: matrix.os == 'ubuntu' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          go build -trimpath -ldflags="-buildid=" -o ubuntu_grpcvpnserver ./desktop_exports/
        env:
          CGO_ENABLED: '1'
          GOOS: 'linux'
          GOARCH: 'amd64'
          CGO_LDFLAGS: "-L${{ github.workspace }}/go_module"
          CC: ${{ steps.install_cc.outputs.cc }}
          CXX: ${{ steps.install_cc.outputs.cxx }}

      - name: Build macOS library
        if: matrix.os == 'macos' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          go build -trimpath -ldflags="-buildid=" -o macos_grpcvpnserver ./desktop_exports/
        env:
          CGO_ENABLED: '1'
          GOOS: 'darwin'
          GOARCH: 'arm64'
          CGO_LDFLAGS: "-lc++ -framework SystemConfiguration -framework CoreFoundation -framework Security -framework Network"
          CC: ${{ steps.install_cc.outputs.cc }}
          CXX: ${{ steps.install_cc.outputs.cxx }}

      - name: Upload built libraries
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows_grpcvpnserver.exe
          path: |
            go_module/windows_grpcvpnserver.exe
            go_module/dobby_bridge.dll

      - name: Upload built libraries
        if: matrix.os == 'ubuntu'
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu_grpcvpnserver
          path: |
            go_module/ubuntu_grpcvpnserver
            go_module/libdobby_bridge.so

      - name: Upload built libraries
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos_grpcvpnserver
          path: |
            go_module/macos_grpcvpnserver
