name: Build Desktop VPN Libraries

on:
  workflow_call:

jobs:
  build_desktop_libs:
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        include:
          - os: windows
            platform: windows
            arch: amd64
          - os: ubuntu
            platform: linux
            arch: amd64
          - os: macos
            platform: macos
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache desktop VPN library
        id: desktop_lib_cache
        uses: actions/cache@v4
        with:
          path: |
            go_module/windows_grpcvpnserver.exe
            go_module/ubuntu_grpcvpnserver
            go_module/macos_grpcvpnserver
            go_module/dobby_bridge.dll
            go_module/libdobby_bridge.so
            go_module/libc++.so.1
            go_module/wintun.dll
          key: ${{ runner.os }}-desktop-vpn-lib-${{ hashFiles('.go-version', 'go_module/**', 'Cloak/internal/**', '.github/workflows/desktop_libs_generate.yml') }}

      - name: Set up Go
        if: steps.desktop_lib_cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache-dependency-path: go_module/go.sum


      - name: Download TrustTunnel Windows lib
        if: matrix.os == 'windows' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        shell: bash
        run: |
          curl -L -o dobby_bridge-windows-x86_64.zip "https://github.com/DobbyVPN/go-go-tunnel/releases/download/v1.0.0/dobby_bridge-windows-x86_64.zip"
          echo "9c0d79401c3da26d922e58c5fc3317c75d800598e9cb91a31ce3aebbf71b4668 dobby_bridge-windows-x86_64.zip" | sha256sum -c -
          unzip dobby_bridge-windows-x86_64.zip

      - name: Install libc++ for Linux
        if: matrix.os == 'ubuntu' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        run: |
          curl -O https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 || true
          rm ./llvm.sh
          sudo apt-get install -y libc++-21-dev libc++abi-21-dev

      - name: Download TrustTunnel Linux lib
        if: matrix.os == 'ubuntu' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          curl -L -o libdobby_bridge-linux-x86_64.zip "https://github.com/DobbyVPN/go-go-tunnel/releases/download/v1.0.0/libdobby_bridge-linux-x86_64.zip"
          echo "515c6993672e35d768477b3cd5c04ee7dfcbeaaeecd5abef5e03c1603486cbfe libdobby_bridge-linux-x86_64.zip" | sha256sum -c -
          unzip libdobby_bridge-linux-x86_64.zip

      - name: Prepare libc++ for packaging
        if: matrix.os == 'ubuntu' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        run: |
          LIBCPP=""
          for f in /usr/lib/llvm-21/lib/x86_64-linux-gnu/libc++.so.1 /usr/lib/llvm-21/lib/libc++.so.1 /usr/lib/x86_64-linux-gnu/libc++.so.1; do
            if [ -e "$f" ]; then LIBCPP="$f"; break; fi
          done
          if [ -n "$LIBCPP" ]; then cp -L "$LIBCPP" ./libc++.so.1; else echo "64-bit libc++.so.1 not found"; exit 1; fi

      - name: Build desktop VPN library
        if: steps.desktop_lib_cache.outputs.cache-hit != 'true'
        run: |
          if [ "${{ matrix.os }}" == "macos" ]; then
            export CGO_LDFLAGS="-lc++ -framework SystemConfiguration -framework CoreFoundation -framework Security -framework Network"
          else
            export CGO_LDFLAGS="-L${{ github.workspace }}/go_module"
          fi
          python .github/scripts/desktop_build.py libs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --go-mod-tidy
        shell: bash

      - name: Download wintun.dll for Windows
        if: matrix.os == 'windows' && steps.desktop_lib_cache.outputs.cache-hit != 'true'
        working-directory: go_module
        shell: bash
        run: |
          curl -#fLo wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          unzip wintun.zip wintun/bin/amd64/wintun.dll
          cp wintun/bin/amd64/wintun.dll ./wintun.dll
          rm -rf wintun.zip wintun

      - name: Upload built libraries
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows_grpcvpnserver.exe
          path: |
            go_module/windows_grpcvpnserver.exe
            go_module/dobby_bridge.dll
            go_module/wintun.dll

      - name: Upload built libraries
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu_grpcvpnserver
          path: |
            go_module/ubuntu_grpcvpnserver
            go_module/libdobby_bridge.so
            go_module/libc++.so.1

      - name: Upload built libraries
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos_grpcvpnserver
          path: |
            go_module/macos_grpcvpnserver
