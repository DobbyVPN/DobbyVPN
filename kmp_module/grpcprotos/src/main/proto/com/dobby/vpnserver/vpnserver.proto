syntax = "proto3";

package grpcproto;

// option go_package = "go_module/grpcproto";
option java_multiple_files = true;
option java_outer_classname = "GrpcProto";
option java_package = "com.dobby.grpcproto";

service Vpn {
  // awg.go
  rpc StartAwg (StartAwgRequest)  returns (Empty);
  rpc StopAwg (Empty)             returns (Empty);

  // outline.go
  rpc GetOutlineLastError(Empty)          returns (GetOutlineLastErrorResponse);
  rpc StartOutline (StartOutlineRequest)  returns (StartOutlineResponse);
  rpc StopOutline (Empty)                 returns (Empty);

  // health_check.go
  rpc CouldStart (Empty)                            returns (CouldStartResponce);
  rpc CheckServerAlive (CheckServerAliveRequest)    returns (CheckServerAliveResponce);

  // cloak.go
  rpc StartCloakClient (StartCloakClientRequest)    returns (Empty);
  rpc StopCloakClient (Empty)                       returns (Empty);

  // logger.go
  rpc InitLogger (InitLoggerRequest)                returns (Empty);

  // georouting.go
  rpc SetGeoRoutingConf (SetGeoRoutingConfRequest)  returns (Empty);
  rpc ClearGeoRoutingConf (Empty)                   returns (Empty);

  // netcheck.go
  rpc NetCheck (NetCheckRequest)                    returns (NetCheckResponse);
  rpc CancelNetCheck (Empty)                        returns (Empty);
}

message StartAwgRequest {
  string tunnel = 1;
  string config = 2;
}

message GetOutlineLastErrorResponse {
  string error = 1;
}

message StartOutlineRequest {
  string config = 1;
}

message StartOutlineResponse {
  int32 result = 1;
}

message CouldStartResponce {
  bool result = 1;
}

message CheckServerAliveRequest {
  string address = 1;
  int32 port = 2;
}

message CheckServerAliveResponce {
  int32 result = 1;
}

message StartCloakClientRequest {
  string localHost = 1;
  string localPort = 2;
  string config = 3;
  bool udp = 4;
}

message InitLoggerRequest {
  string path = 1;
}

message SetGeoRoutingConfRequest {
  string cidrs = 1;
}

message NetCheckRequest {
  string configPath = 1;
}

message NetCheckResponse {
  string error = 1;
}

message Empty {
}
